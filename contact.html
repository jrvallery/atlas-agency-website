<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Colorado AI Atlas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { navy: '#0f172a', slate: '#1e293b', electric: '#3b82f6', accent: '#60a5fa' } } } }
    </script>
    <style> body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-navy text-white antialiased flex flex-col min-h-screen">
    
    <nav class="bg-slate border-b border-gray-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <a href="index.html" class="flex-shrink-0 font-bold text-2xl tracking-tighter text-electric">Colorado AI Atlas</a>
                </div>
                <div class="hidden md:block">
                    <div class="ml-10 flex items-baseline space-x-4">
                        <a href="index.html" class="hover:text-accent px-3 py-2 rounded-md text-sm font-medium">Home</a>
                        <a href="services.html" class="hover:text-accent px-3 py-2 rounded-md text-sm font-medium">Services</a>
                        <a href="pricing.html" class="hover:text-accent px-3 py-2 rounded-md text-sm font-medium">Pricing</a>
                        <a href="contact.html" class="text-accent px-3 py-2 rounded-md text-sm font-medium">Get Started</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow py-20">
        <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center mb-12">
                <h1 class="text-4xl font-extrabold mb-4">Let's Automate Your Business</h1>
                <p class="text-gray-400 text-lg">Drop your details below and we'll reach out to schedule a free consultation for your Colorado business.</p>
            </div>

            <div class="bg-slate p-8 rounded-2xl border border-gray-800 shadow-xl">
                <form action="#" method="POST" class="space-y-6" onsubmit="event.preventDefault(); alert('Thanks! We will be in touch soon.');">
                    <div>
                        <label for="name" class="block text-sm font-medium text-gray-300">Name</label>
                        <input type="text" id="name" name="name" required class="mt-1 block w-full bg-navy border border-gray-700 rounded-md shadow-sm py-3 px-4 text-white focus:outline-none focus:ring-2 focus:ring-electric focus:border-electric">
                    </div>
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-300">Email Address</label>
                        <input type="email" id="email" name="email" required class="mt-1 block w-full bg-navy border border-gray-700 rounded-md shadow-sm py-3 px-4 text-white focus:outline-none focus:ring-2 focus:ring-electric focus:border-electric">
                    </div>
                    <div>
                        <label for="business" class="block text-sm font-medium text-gray-300">Business Name</label>
                        <input type="text" id="business" name="business" class="mt-1 block w-full bg-navy border border-gray-700 rounded-md shadow-sm py-3 px-4 text-white focus:outline-none focus:ring-2 focus:ring-electric focus:border-electric">
                    </div>
                    <div>
                        <label for="niche" class="block text-sm font-medium text-gray-300">Industry / Niche</label>
                        <select id="niche" name="niche" class="mt-1 block w-full bg-navy border border-gray-700 rounded-md shadow-sm py-3 px-4 text-white focus:outline-none focus:ring-2 focus:ring-electric focus:border-electric">
                            <option value="">Select your industry...</option>
                            <option value="health">Health, Wellness & Fitness</option>
                            <option value="home">Home Services & Contractors</option>
                            <option value="retail">Local Retail & E-commerce</option>
                            <option value="realestate">Boutique Real Estate</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div>
                        <label for="message" class="block text-sm font-medium text-gray-300">How can we help?</label>
                        <textarea id="message" name="message" rows="4" class="mt-1 block w-full bg-navy border border-gray-700 rounded-md shadow-sm py-3 px-4 text-white focus:outline-none focus:ring-2 focus:ring-electric focus:border-electric"></textarea>
                    </div>
                    <div>
                        <button type="submit" class="w-full bg-electric hover:bg-blue-600 text-white font-bold py-3 px-4 rounded-lg shadow-lg transition-colors text-lg">
                            Send Message
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer class="bg-slate border-t border-gray-800 py-12 mt-auto">
        <div class="max-w-7xl mx-auto px-4 text-center text-gray-400">
            <p>&copy; 2026 Colorado AI Atlas. Colorado. Built with OpenClaw.</p>
        </div>
    </footer>

    <!-- ===================== FLOATING CHAT WIDGET ===================== -->
    <div id="chat-window" style="position:fixed;bottom:80px;left:16px;width:360px;height:500px;z-index:9999;display:none;flex-direction:column;background:#0d1117;border:1px solid rgba(59,130,246,0.4);border-radius:16px;overflow:hidden;box-shadow:0 25px 50px rgba(0,0,0,0.5);">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);">
            <div style="display:flex;align-items:center;gap:10px;">
                <div style="width:32px;height:32px;border-radius:50%;background:rgba(59,130,246,0.2);border:1px solid rgba(59,130,246,0.4);display:flex;align-items:center;justify-content:center;font-size:14px;">🤖</div>
                <div>
                    <div style="font-size:13px;font-weight:600;color:#fff;">Atlas Co-pilot</div>
                    <div style="font-size:11px;color:#4ade80;display:flex;align-items:center;gap:4px;"><span style="width:6px;height:6px;background:#4ade80;border-radius:50%;display:inline-block;"></span>Online</div>
                </div>
            </div>
            <button onclick="toggleChat()" style="background:none;border:none;color:#9ca3af;cursor:pointer;padding:4px;font-size:18px;line-height:1;">✕</button>
        </div>
        <div id="chat-messages" style="flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px;"></div>
        <div style="padding:12px;border-top:1px solid rgba(255,255,255,0.08);">
            <form id="chat-form" style="display:flex;gap:8px;">
                <input id="chat-input" type="text" placeholder="Ask about pricing, services..." autocomplete="off"
                    style="flex:1;background:#1e2433;color:#fff;border:1px solid rgba(255,255,255,0.15);border-radius:10px;padding:10px 14px;font-size:13px;outline:none;"/>
                <button type="submit" id="chat-send" style="background:#3b82f6;border:none;color:#fff;border-radius:10px;padding:10px 14px;cursor:pointer;display:flex;align-items:center;justify-content:center;">
                    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
                </button>
            </form>
        </div>
    </div>
    <button id="chat-toggle" onclick="toggleChat()" style="position:fixed;bottom:16px;left:16px;z-index:9999;width:52px;height:52px;border-radius:50%;background:#3b82f6;border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(59,130,246,0.4);transition:transform 0.2s,background 0.2s;" onmouseover="this.style.background='#2563eb'" onmouseout="this.style.background='#3b82f6'">
        <svg id="chat-icon-open" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
        <svg id="chat-icon-close" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="display:none;"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
    <!-- =============================================================== -->
    <script>
        const CHAT_ENDPOINT = '/api/chat';
        const chatWindow   = document.getElementById('chat-window');
        const chatMessages = document.getElementById('chat-messages');
        const chatForm     = document.getElementById('chat-form');
        const chatInput    = document.getElementById('chat-input');
        const chatSend     = document.getElementById('chat-send');
        const iconOpen     = document.getElementById('chat-icon-open');
        const iconClose    = document.getElementById('chat-icon-close');
        const s = document.createElement('style');
        s.textContent = `@keyframes typingBounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}`;
        document.head.appendChild(s);
        let isOpen = false;
        let messages = JSON.parse(sessionStorage.getItem('atlas-chat') || '[]');
        if (!messages.length) messages = [{ role: 'assistant', content: "Hey! I\'m the Atlas co-pilot — a live demo of what we build for our clients. Ask me anything about services, pricing, or how it all works!" }];
        function toggleChat() {
            isOpen = !isOpen;
            chatWindow.style.display = isOpen ? 'flex' : 'none';
            iconOpen.style.display = isOpen ? 'none' : 'block';
            iconClose.style.display = isOpen ? 'block' : 'none';
            if (isOpen) { if (!chatMessages.children.length) renderHistory(); chatInput.focus(); chatMessages.scrollTop = chatMessages.scrollHeight; }
        }
        function renderHistory() { chatMessages.innerHTML = ''; messages.forEach(m => renderBubble(m.role, m.content)); }
        function renderBubble(role, content) {
            const wrap = document.createElement('div');
            wrap.style.cssText = 'display:flex;gap:8px;' + (role === 'user' ? 'justify-content:flex-end;' : '');
            if (role === 'assistant') {
                wrap.innerHTML = `<div style="width:26px;height:26px;border-radius:50%;background:rgba(59,130,246,0.2);border:1px solid rgba(59,130,246,0.4);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;margin-top:2px;">🤖</div><div style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:14px;border-top-left-radius:4px;padding:10px 14px;color:#e2e8f0;max-width:260px;font-size:13px;line-height:1.5;text-align:left;" id="bubble-${Date.now()}"></div>`;
            } else {
                wrap.innerHTML = `<div style="background:rgba(59,130,246,0.18);border:1px solid rgba(59,130,246,0.3);border-radius:14px;border-top-right-radius:4px;padding:10px 14px;color:#fff;max-width:260px;font-size:13px;line-height:1.5;text-align:left;">${content}</div>`;
            }
            chatMessages.appendChild(wrap);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return role === 'assistant' ? wrap.querySelector('[id^="bubble-"]') : null;
        }
        function showTyping() {
            const w = document.createElement('div'); w.id='typing-ind'; w.style.cssText='display:flex;gap:8px;';
            w.innerHTML=`<div style="width:26px;height:26px;border-radius:50%;background:rgba(59,130,246,0.2);border:1px solid rgba(59,130,246,0.4);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;margin-top:2px;">🤖</div><div style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:14px;border-top-left-radius:4px;padding:12px 14px;display:flex;gap:5px;align-items:center;"><span style="width:7px;height:7px;background:#60a5fa;border-radius:50%;animation:typingBounce 1.2s infinite ease-in-out;"></span><span style="width:7px;height:7px;background:#60a5fa;border-radius:50%;animation:typingBounce 1.2s infinite ease-in-out 0.2s;"></span><span style="width:7px;height:7px;background:#60a5fa;border-radius:50%;animation:typingBounce 1.2s infinite ease-in-out 0.4s;"></span></div>`;
            chatMessages.appendChild(w); chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        function hideTyping() { document.getElementById('typing-ind')?.remove(); }
        function setLoading(on) {
            chatSend.disabled = chatInput.disabled = on;
            chatSend.innerHTML = on ? '<svg width="16" height="16" fill="none" viewBox="0 0 24 24"><circle style="opacity:.25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path style="opacity:.75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/></svg>' : '<svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>';
        }
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = chatInput.value.trim(); if (!text) return;
            chatInput.value = '';
            messages.push({ role: 'user', content: text });
            renderBubble('user', text);
            sessionStorage.setItem('atlas-chat', JSON.stringify(messages));
            setLoading(true); showTyping();
            let bubble = null, reply = '', resStatus = 200;
            try {
                const res = await fetch(CHAT_ENDPOINT, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ model:'openclaw', stream:true, messages }) });
                resStatus = res.status;
                if (res.status === 429) throw new Error('rate_limited');
                const reader = res.body.getReader(), dec = new TextDecoder();
                while (true) {
                    const { done, value } = await reader.read(); if (done) break;
                    for (const line of dec.decode(value).split('\n')) {
                        if (!line.startsWith('data: ') || line.includes('[DONE]')) continue;
                        try { const delta = JSON.parse(line.slice(6))?.choices?.[0]?.delta?.content; if (delta) { if (!bubble) { hideTyping(); bubble = renderBubble('assistant',''); } reply += delta; bubble.textContent += delta; chatMessages.scrollTop = chatMessages.scrollHeight; } } catch {}
                    }
                }
                messages.push({ role:'assistant', content:reply });
                sessionStorage.setItem('atlas-chat', JSON.stringify(messages));
            } catch { hideTyping(); if (!bubble) bubble = renderBubble('assistant',''); bubble.textContent = resStatus===429 ? "Too many messages — try again in a minute." : 'Connection error — demo may be offline. Try the contact page!'; }
            setLoading(false); chatInput.focus();
        });
    </script>

</body>
</html>
